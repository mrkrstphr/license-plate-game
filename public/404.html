<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>License Plate Game</title>
    <script>
      // GitHub Pages SPA redirect: forward path as query param, root script picks it up
      const path = window.location.pathname.replace('/license-plate-game', '');
      const search = window.location.search;
      const hash = window.location.hash;
      const redirectUrl =
        window.location.origin +
        '/license-plate-game/?p=' +
        encodeURIComponent(path + search) +
        hash;
      window.location.replace(redirectUrl);
    </script>
  </head>
  <body></body>
</html>
