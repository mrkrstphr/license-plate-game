<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>License Plate Game</title>
    <script>
      // Store the full path in sessionStorage, then redirect to root.
      // The app picks it up on load and navigates there.
      var path = window.location.pathname.replace('/license-plate-game', '') || '/';
      var search = window.location.search;
      var hash = window.location.hash;
      sessionStorage.setItem('spa_redirect', path + search + hash);
      window.location.replace('/license-plate-game/');
    </script>
  </head>
  <body></body>
</html>
